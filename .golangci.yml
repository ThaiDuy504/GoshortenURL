linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - godot
    - noctx
    - bodyclose

linters-settings:
  # gofmt + goimports settings below
  gofmt:
    simplify: true
  goimports:
    local-prefixes: Go_shortenURL
  misspell:
    locale: US

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
