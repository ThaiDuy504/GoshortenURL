services:
    postgres:
        image: postgres:15-alpine
        container_name: postgres_server
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: secret
            POSTGRES_DB: shortener
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d shortener"]
            interval: 5s
            timeout: 3s
            retries: 10

    redis:
        image: redis:latest
        container_name: redis_server
        restart: always
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        command: redis-server --appendonly yes --requirepass 123
volumes:
    postgres_data:
    redis_data:
